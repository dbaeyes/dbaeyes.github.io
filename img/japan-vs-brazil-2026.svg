<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" width="600" height="300">
  <!-- Background -->
  <rect width="600" height="300" fill="#0a1628"/>

  <!-- Stars decoration -->
  <circle cx="80" cy="50" r="2" fill="white" opacity="0.4"/>
  <circle cx="150" cy="30" r="1.5" fill="white" opacity="0.3"/>
  <circle cx="520" cy="60" r="2" fill="white" opacity="0.4"/>
  <circle cx="450" cy="25" r="1.5" fill="white" opacity="0.3"/>
  <circle cx="300" cy="20" r="1.5" fill="white" opacity="0.3"/>

  <!-- Japan flag circle -->
  <circle cx="160" cy="150" r="70" fill="white"/>
  <circle cx="160" cy="150" r="28" fill="#BC002D"/>

  <!-- VS text -->
  <text x="300" y="140" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="36" font-weight="900" fill="white">VS</text>
  <text x="300" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#aaaaaa" letter-spacing="2">ROUND OF 32 · FIFA WORLD CUP 2026</text>

  <!-- Brazil flag -->
  <rect x="375" y="95" width="130" height="110" rx="4" fill="#009c3b"/>
  <polygon points="440,105 495,150 440,195 385,150" fill="#FEDF00"/>
  <circle cx="440" cy="150" r="30" fill="#002776"/>
  <!-- Brazil flag white stripe -->
  <path d="M415,145 Q440,138 465,145" stroke="white" stroke-width="2.5" fill="none"/>

  <!-- Country names -->
  <text x="160" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="white">JAPAN</text>
  <text x="440" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="white">BRAZIL</text>

  <!-- Date -->
  <text x="300" y="275" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#888888">NRG Stadium, Houston · June 29, 2026</text>
</svg>
